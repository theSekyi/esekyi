<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <div class="page-layout">
      <header class="main-header">{{ partial "header.html" . }}</header>

      <main class="site-main">
        <div class="container">
          <article class="distill-article">
            {{ block "main" . }}{{ end }}
          </article>
        </div>
      </main>

      <footer class="site-footer">{{ partial "footer.html" . }}</footer>
    </div>
  </body>
</html>

<style>
  html,
  body {
    min-height: 100%;
  }

  .page-layout {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .main-header {
    background: var(--brand-ink);
  }

  .site-main {
    width: 100%;
    padding: 0 0 4rem;
    background: #fff;
  }

  .site-footer {
    background: var(--brand-ink);
  }
</style>
