{{ define "main" }}
<article class="about-page">
  <header class="about-hero">
    <div class="about-hero-inner">
      <h1>{{ .Title }}</h1>
    </div>
  </header>

  <div class="about-body">
    <div class="about-content">
      {{ .Content }}
    </div>
  </div>
</article>

<style>
  .about-page {
    padding-top: 0.5rem;
  }

  .about-hero {
    padding: 2.2rem 0 1.2rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  }

  .about-hero-inner,
  .about-body {
    width: min(var(--page-width), 100%);
    margin: 0 auto;
  }

  .about-hero h1 {
    margin: 0;
    font-size: clamp(2.3rem, 5vw, 3.5rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: rgba(0, 0, 0, 0.96);
  }

  .about-body {
    padding-top: 1.75rem;
  }

  .about-content {
    max-width: 720px;
  }

  .about-content > :first-child {
    margin-top: 0;
  }

  .about-content > p:first-of-type {
    font-size: 20px;
    line-height: 1.65;
    color: rgba(0, 0, 0, 0.72);
    margin-bottom: 2rem;
  }

  .about-content h2 {
    margin: 2.4rem 0 0.75rem;
    font-size: 32px;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: rgba(0, 0, 0, 0.9);
  }

  .about-content h3 {
    margin: 1.5rem 0 0.5rem;
    font-size: 22px;
    line-height: 1.2;
    color: rgba(0, 0, 0, 0.85);
  }

  .about-content p {
    margin: 0 0 1rem;
    font-size: 17px;
    line-height: 1.75;
    color: rgba(0, 0, 0, 0.8);
  }

  .about-content ul {
    margin: 0.5rem 0 1.5rem 1.2rem;
    padding: 0;
  }

  .about-content li {
    margin: 0 0 0.45rem;
    padding-left: 0.2rem;
    font-size: 17px;
    line-height: 1.7;
    color: rgba(0, 0, 0, 0.8);
  }

  .about-content strong {
    color: rgba(0, 0, 0, 0.92);
  }

  .about-content em {
    color: rgba(0, 0, 0, 0.68);
  }

  .about-content a {
    color: #004276;
    text-decoration: none;
  }

  .about-content a:hover {
    text-decoration: underline;
  }

  .about-content .project-list {
    margin: 0.75rem 0 1.75rem 1.4rem;
    padding: 0;
  }

  .about-content .project-item {
    margin: 0 0 1.4rem;
    padding-left: 0.25rem;
  }

  .about-content .project-title {
    margin: 0 0 0.45rem;
  }

  .about-content .project-name {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: rgba(0, 0, 0, 0.9);
  }

  .about-content .project-name:hover {
    text-decoration: none;
  }

  .about-content .project-name span {
    text-decoration: none;
  }

  .about-content .project-name:hover span {
    text-decoration: underline;
  }

  .about-content .project-logo-inline {
    display: block;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    flex: 0 0 auto;
  }

  .about-content .project-links {
    margin-bottom: 0;
    font-size: 15px;
  }

  .about-content br + a,
  .about-content br + em,
  .about-content br + strong {
    display: inline-block;
    margin-top: 0.2rem;
  }

  @media (max-width: 767px) {
    .about-page {
      padding-top: 0;
    }

    .about-hero {
      padding: 1.6rem 0 1rem;
    }

    .about-content > p:first-of-type {
      font-size: 18px;
      margin-bottom: 1.5rem;
    }

    .about-content h2 {
      font-size: 26px;
    }

    .about-content h3 {
      font-size: 20px;
    }

    .about-content p,
    .about-content li {
      font-size: 16px;
    }
  }
</style>
{{ end }}
