<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
/>
<meta name="theme-color" content="#0f2e3d" />

<title>
  {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{
  end }}
</title>

<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
<link rel="icon" href="/favicon.ico" type="image/x-icon" />

<style>
  html {
    scroll-behavior: smooth;
    -ms-text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto;
    }
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
</style>

<style>
  :root {
    --page-width: 984px;
    --article-width: 720px;
    --side-width: 220px;
    --gutter: clamp(16px, 4vw, 32px);
    --nav-height: 60px;
    --brand-ink: hsl(200, 60%, 15%);
    --font-primary: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
  }

  html {
    font: 400 16px/1.55em var(--font-primary);
    background: #fff;
  }

  body {
    margin: 0;
    color: rgba(0, 0, 0, 0.8);
    counter-reset: sidenote-counter;
    background: #fff;
  }

  a {
    color: #004276;
  }

  p,
  ul,
  ol {
    font-size: 16px;
    line-height: 1.55;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-primary);
    color: rgba(0, 0, 0, 0.84);
    line-height: 1.15;
    margin-top: 0;
  }

  h1 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
  }

  h2 {
    font-size: clamp(1.6rem, 3vw, 2.1rem);
    font-weight: 700;
  }

  .container {
    width: min(var(--page-width), calc(100vw - 2 * var(--gutter)));
    margin: 0 auto;
    overflow-x: hidden;
  }

  .distill-article {
    position: relative;
    width: 100%;
    margin: 0 auto;
  }

  .sidenote {
    float: right;
    clear: right;
    margin-right: calc(-1 * (var(--side-width) + 2rem));
    width: var(--side-width);
    font-size: 0.8em;
    line-height: 1.4;
    vertical-align: baseline;
    position: relative;
  }

  @media (max-width: 1080px) {
    .sidenote {
      float: none;
      margin: 1rem 0;
      width: 100%;
    }
  }
</style>

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
/>
<script
  defer
  src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
></script>
