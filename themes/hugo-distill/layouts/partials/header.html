<nav class="site-nav">
  <div class="nav-shell">
    <a href="/" class="site-logo" aria-label="{{ .Site.Title }} home">{{ .Site.Title }}</a>

    <div class="site-nav-links">
      <a href="/about/" class="nav-link {{ if eq .Section "about" }}active{{ end }}">About</a>
      {{ with .Site.Params.social.github }}
      <a href="https://github.com/{{ . }}" class="nav-link" target="_blank" rel="noopener noreferrer">GitHub</a>
      {{ end }}
      {{ with .Site.Params.social.twitter }}
      <a href="https://twitter.com/{{ . }}" class="nav-link" target="_blank" rel="noopener noreferrer">Twitter</a>
      {{ end }}
    </div>
  </div>
</nav>

<style>
  .site-nav {
    width: 100%;
    background: var(--brand-ink);
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
  }

  .nav-shell {
    width: min(var(--page-width), calc(100vw - 2 * var(--gutter)));
    min-height: 60px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-logo,
  .site-nav-links a {
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
  }

  .site-logo {
    font-size: 17px;
    font-weight: 400;
    line-height: 60px;
  }

  .site-logo:hover,
  .site-nav-links a:hover,
  .site-nav-links a.active {
    color: #fff;
  }

  .site-nav-links {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .site-nav-links a {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 60px;
    font-weight: 400;
  }

  @media (min-width: 1080px) {
    .nav-shell {
      min-height: 70px;
    }

    .site-logo,
    .site-nav-links a {
      line-height: 70px;
    }
  }

  @media (max-width: 640px) {
    .site-nav-links {
      gap: 1rem;
    }

    .site-nav-links a {
      font-size: 11px;
    }
  }
</style>
